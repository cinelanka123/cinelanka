<!DOCTYPE html>
<html>
<head>
  <title>CineLanka</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      margin: 0;
      text-align: center;
    }

    h1 { color: red; }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 20px;
      border: none;
      margin: 15px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .movie {
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .movie img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      cursor: pointer;
    }

    .movie p {
      font-size: 12px;
      padding: 5px;
    }

    .fav {
      position: absolute;
      top: 5px;
      right: 8px;
      cursor: pointer;
    }

    video {
      width: 90%;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>

<body>

<h1>🎬 CineLanka</h1>

<input type="text" id="search" placeholder="Search films..." onkeyup="searchMovies()">

<h2>Old Films</h2>
<div class="container" id="movies"></div>

<video id="player" controls>
  <source id="source" src="" type="video/mp4">
</video>

<script>

// ▶️ PLAY VIDEO
function playMovie(file) {
  let player = document.getElementById("player");
  let source = document.getElementById("source");

  source.src = file;
  player.load();
  player.style.display = "block";
}

// 🎬 FILM NAMES
function getFilmName(i) {
  const names = [
    "Kathuru Mithuru","Gamani","Sooriya Arana","Sarungale","Aba",
    "Machan","Pravegaya","Sikuru Hathe","Saroja","Ran Kevita",
    "Super Six","Ko Mark No Mark","Aloko Udapadi","U Turn",
    "Face 2 Face","Challenge","Julia","Gini Avi","Yasa Isuru","Sihinayaki Adare",
    "Nidahase Piya","Wekande Walauwa","Uththara","Ini Avan","Flying Fish",
    "Sulanga Enu Pinisa","Ira Madiyama","28","Aswesuma","Nikini Vessa",
    "Siri Raja Siri","Hansa Vilak","Mahindagamanaya","Pathini","Sangili",
    "Jangi Hora","Bandanaya","Ethumai Methumai","Vijaya Kuweni","Alimankada",
    "Kusa Paba","Queen of Hearts","Suhada Koka","Ran Kevita 2","Happy Birthday",
    "Dr Nawariyan","Face to Face","Gini Avi Saha Gini Keli","Yasa Isuru","Sihinayaki Adare"
  ];

  return names[i - 1] || "Film " + i;
}

// ❤️ FAVORITE
function toggleFav(el) {
  el.innerText = (el.innerText == "❤️") ? "💔" : "❤️";
}

// 🎞️ ADD 50 FILMS
let container = document.getElementById("movies");

for (let i = 1; i <= 50; i++) {
  container.innerHTML += `
    <div class="movie">
      <span class="fav" onclick="toggleFav(this)">❤️</span>

      <!-- IMAGE FIX -->
      <img src="movie${i}.jpg" onclick="playMovie('movie${i}.mp4')">

      <p>${getFilmName(i)}</p>
    </div>
  `;
}

// 🔍 SEARCH
function searchMovies() {
  let input = document.getElementById("search").value.toLowerCase();
  let movies = document.getElementsByClassName("movie");

  for (let i = 0; i < movies.length; i++) {
    let name = movies[i].innerText.toLowerCase();
    movies[i].style.display = name.includes(input) ? "block" : "none";
  }
}

</script>

</body>
</html>
